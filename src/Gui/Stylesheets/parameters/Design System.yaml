---
BaseShades:
  050: 0.05
  100: 0.10
  200: 0.20
  300: 0.30
  400: 0.40
  500: 0.50
  600: 0.60
  700: 0.70
  800: 0.80
  900: 0.90

BaseRadius:
  small: 1px
  medium: 2px
  large: 4px

BaseSpacing: 4px
SpacingFactors:
  000: 0.0
  050: 0.5
  100: 1.0
  150: 1.5
  200: 2.0
  250: 2.5
  300: 3.0
  400: 4.0
  500: 5.0
  600: 6.0
  800: 8.0
  1000: 10.0
  1200: 12.0
  1600: 16.0

Spacing: "@BaseSpacing * @SpacingFactors"

Neutral: "shades(#adb5bd, (000: 0.00, 150: 0.15) + @BaseShades, range: 0.6, max: 1.0)"
Contrast: "shades(#495057, @BaseShades, range: 0.6)"

Blue: "shades(#418fde, @BaseShades)"
Orange: "shades(#ff922b, @BaseShades)"
Accent: "@Blue"

Background:
  000: "@Neutral.000"
  050: "@Neutral.050"
  100: "@Neutral.100"
  150: "@Neutral.150"
  200: "@Neutral.200"

BaseTextColor: "@Contrast.700"

# ── Semantic surface tokens (drive QPalette) ─────────────────────────────────
# Window / panel backgrounds
BaseWindowBackground:    "@Background.050"
BaseAlternateBackground: "@Background.100"
BaseInputBackground:     "@Background.000"

# Selection
BaseHighlightBackground: "blend(@Background.100, @Accent.500, 75%)"
BaseHighlightTextColor:  "@Neutral.000"

# Disabled
BaseDisabledTextColor:   "@Contrast.300"
BaseDisabledBackground:  "@Neutral.200"

# Placeholder text in inputs
BasePlaceholderTextColor: "@Contrast.400"

# Links / URLs
BaseLinkColor: "@Accent.600"

# Tooltips
BaseTooltipBackground: "@Contrast.800"
BaseTooltipTextColor:  "@Neutral.050"

# 3D shading (QPalette Light / Midlight / Mid / Dark / Shadow)
BaseShadingLight:    "@Neutral.100"
BaseShadingMidlight: "@Neutral.200"
BaseShadingMid:      "@Neutral.400"
BaseShadingDark:     "@Neutral.600"
BaseShadingShadow:   "@Neutral.800"

BaseHoveredOverlay: "#ffffff"
BaseHoveredOverlayOpacity: 50%

BasePressedOverlay: "@Contrast.800"
BasePressedOverlayOpacity: 10%
BaseHalfPressedOverlayOpacity: 7%

FormControlSmallHeight: 22px
FormControlHeight: 26px
FormControlBigHeight: 32px

FormControlPadding: "padding(horizontal: @Spacing.150, vertical: @Spacing.100)"
FormControlBorderThickness: 1px
FormControlBorderRadius: 3px
FormControlBorderColor: "@Neutral.400"
FormControlTextColor: "@BaseTextColor"

ButtonBackground: "linear_gradient(x1: 0, y1: 0, x2: 0, y2: 1, @Background.100, @Background.200)"
ButtonMinWidth: 100px
ButtonHeight: "@FormControlHeight"
ButtonPadding: "padding(horizontal: @Spacing.300, vertical: @Spacing.100)"
ButtonIconSpacing: "@Spacing.150"
ButtonIconSize: 16px
ButtonFontSize: 12px
ButtonFontWeight: 500
ButtonContentBox: "content_box((width: @ButtonMinWidth, height: @ButtonHeight), @ButtonPadding, @ButtonBorderThickness)"

ButtonSmallFontSize: 11px
ButtonSmallFontWeight: 500

ButtonFocusedBorderColor: "@Accent.500"
ButtonPrimaryFocusedBorderColor: "@Accent.500"

ButtonSpacing: "@Spacing.250"

ButtonTextColor: "@BaseTextColor"
ButtonBorderColor: "@Neutral.400"

ButtonHoveredOverlay: "opacity(@BaseHoveredOverlay, @BaseHoveredOverlayOpacity)"

ButtonPressedOverlay: "opacity(@BasePressedOverlay, @BasePressedOverlayOpacity)"
ButtonPressedInnerShadow: "inner_shadow(color: rgba(0, 0, 0, 50), y: 2px, blur: 6px)"

ButtonCheckedOverlay: "opacity(@BasePressedOverlay, @BaseHalfPressedOverlayOpacity)"
ButtonCheckedInnerShadow: "inner_shadow(color: rgba(0, 0, 0, 50), y: 2px, blur: 6px)"

ButtonPrimaryBackground: "blend(@ButtonBackground, @Accent.500, 15%)"
ButtonPrimaryBorderColor: "blend(@ButtonBorderColor, @Accent.500, 25%)"

ToolButtonPadding: "padding(horizontal: @Spacing.100, vertical: @Spacing.050)"
ToolButtonSmallPadding: "padding(horizontal: @Spacing.100, vertical: @Spacing.050)"

ToolButtonHeight: "@FormControlHeight"
ToolButtonSmallHeight: "@FormControlSmallHeight"

# ── Select Padding overrides
SelectPadding: "padding(horizontal: @Spacing.200, vertical: @Spacing.100)"
SelectSmallPadding: "@FormControlSmallPadding"
SelectBigPadding: "@FormControlBigPadding"

# ── Line Edit / Input fields ──────────────────────────────────────────────
LineEditBackground:          "@Background.000"
LineEditBorderColor:         "@Neutral.400"
LineEditBorderRadius:        "@FormControlBorderRadius"
LineEditBorderThickness:     "@FormControlBorderThickness"
LineEditPadding:             "@FormControlPadding"
LineEditHeight:              "@FormControlHeight"
LineEditSmallHeight:         "@FormControlSmallHeight"

LineEditFocusedBorderColor:  "@Accent.500"

InputBackground: "@Background.000"

TextEditPadding: "padding(@FormControlPadding.left)"

DialogBackground: "@Background.050"

GroupBoxBackground: "@Background.050"
GroupBoxBorderColor: "@Neutral.300"
GroupBoxBorderRadius: "@BaseRadius.medium"
GroupBoxPadding: "padding(@Spacing.300, top: @Spacing.400)"

GroupBoxTitlePadding: "padding(horizontal: @Spacing.150, vertical: 0)"
GroupBoxTitleFontSize: 10px
GroupBoxTitleFontWeight: 600
GroupBoxTitleTextColor: "@Contrast.500"
