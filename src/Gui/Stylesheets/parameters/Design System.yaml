---
BaseShades:
  050: 0.05
  100: 0.10
  200: 0.20
  300: 0.30
  400: 0.40
  500: 0.50
  600: 0.60
  700: 0.70
  800: 0.80
  900: 0.90

BaseSpacing: 4px
SpacingFactors:
  000: 0.0
  050: 0.5
  100: 1.0
  150: 1.5
  200: 2.0
  250: 2.5
  300: 3.0
  400: 4.0
  500: 5.0
  600: 6.0
  800: 8.0
  1000: 10.0
  1200: 12.0
  1600: 16.0

Spacing: "@BaseSpacing * @SpacingFactors"

Neutral: "shades(#adb5bd, @BaseShades, range: 0.6)"
Contrast: "shades(#495057, @BaseShades, range: 0.6)"

Blue: "shades(#418fde, @BaseShades)"
Orange: "shades(#ff922b, @BaseShades)"
Accent: "@Blue"

Background:
  050: "@Neutral.050"
  100: "@Neutral.100"
  200: "@Neutral.200"

BaseTextColor: "@Contrast.800"

BaseHoverOverlay: "#ffffff"
BaseHoverOverlayOpacity: 50%

BasePressedOverlay: "@Contrast.800"
BasePressedOverlayOpacity: 15%
BaseHalfPressedOverlayOpacity: 10%

ButtonMinWidth: 100px
ButtonHeight: 26px
ButtonBorderThickness: 1px
ButtonBorderRadius: 3px
ButtonPadding: "padding(horizontal: @Spacing.300, vertical: @Spacing.100)"
ButtonIconSpacing: "@Spacing.300"
ButtonIconSize: 16px
ButtonFontSize: 12px
ButtonFontWeight: 500
ButtonContentBox: "content_box((width: @ButtonMinWidth, height: @ButtonHeight), @ButtonPadding, @ButtonBorderThickness)"

ButtonSpacing: "@Spacing.250"

ButtonTextColor: "@BaseTextColor"
ButtonBorderColor: "@Neutral.400"
ButtonBackground: "linear_gradient(x1: 0, y1: 0, x2: 0, y2: 1, @Background.100, @Background.200)"

ButtonPrimaryBackground: "blend(@ButtonBackground, @Accent.400, 15%)"
ButtonPrimaryBorderColor: "blend(@ButtonBorderColor, @Accent.400, 15%)"
