<svg
   width="64"
   height="64"
   viewBox="0 0 64 64"
   version="1.1"
   xmlns="http://www.w3.org/2000/svg">
  <!-- Three walls converging on one shared junction node. -->
  <g
     fill="none"
     stroke="#302b00"
     stroke-width="12"
     stroke-linecap="butt"
     stroke-linejoin="round">
    <path d="M 32,32 V 6" />
    <path d="M 29,34 7,47" />
    <path d="M 35,34 57,47" />
  </g>
  <g
     fill="none"
     stroke="#edd400"
     stroke-width="8"
     stroke-linecap="butt"
     stroke-linejoin="round">
    <path d="M 32,32 V 6" />
    <path d="M 29,34 7,47" />
    <path d="M 35,34 57,47" />
  </g>
  <circle
     cx="32"
     cy="32"
     r="8"
     fill="#fce94f"
     stroke="#302b00"
     stroke-width="2.6" />
</svg>
