name: Push Crowdin Translations

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 1"

permissions:
  contents: read

jobs:
  update-crowdin:
    runs-on: ubuntu-latest
    if: github.repository_owner == 'FreeCAD' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          ref: main

      - name: Install Qt ≥ 6.8
        uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730
        with:
          aqtversion: "==3.1.*"
          version: "6.8.3"
          host: "linux"
          target: "desktop"
          arch: "linux_gcc_64"

      - name: Setup Python & dependencies
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.13"
      - name: Install Python packages
        run: |
          python3 -m pip install --upgrade pip
          pip install pyside6

      - name: Push translations to Crowdin
        run: |
          ./updatecrowdin.py gather
          ./updatecrowdin.py upload
        working-directory: ./src/Tools
        env:
          CROWDIN_TOKEN: ${{ secrets.CROWDIN_TOKEN }}
          CROWDIN_PROJECT_ID: freecad
