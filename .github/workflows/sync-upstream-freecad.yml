name: Sync upstream FreeCAD

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-upstream-freecad
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      UPSTREAM_REPO: https://github.com/FreeCAD/FreeCAD.git
      UPSTREAM_BRANCH: main
      TARGET_BRANCH: main
      SYNC_BRANCH: upstream-sync/freecad
    steps:
      - name: Checkout Parashell
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.TARGET_BRANCH }}

      - name: Configure git identity
        run: |
          git config user.name "parashell-bot"
          git config user.email "ops@parashell.cloud"

      - name: Fetch upstream
        run: |
          git remote add upstream "$UPSTREAM_REPO"
          git fetch upstream "$UPSTREAM_BRANCH"

      - name: Detect upstream changes
        id: detect
        run: |
          behind=$(git rev-list --count "${TARGET_BRANCH}..upstream/${UPSTREAM_BRANCH}")
          echo "behind=$behind" >> "$GITHUB_OUTPUT"
          if [ "$behind" = "0" ]; then
            echo "Parashell is already up to date with upstream."
          else
            echo "$behind new upstream commit(s) detected."
          fi

      - name: Publish sync branch
        if: steps.detect.outputs.behind != '0'
        run: |
          git checkout -B "$SYNC_BRANCH" "upstream/${UPSTREAM_BRANCH}"
          git push --force origin "$SYNC_BRANCH"

      - name: Open or update pull request
        if: steps.detect.outputs.behind != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BEHIND: ${{ steps.detect.outputs.behind }}
        run: |
          existing=$(gh pr list --base "$TARGET_BRANCH" --head "$SYNC_BRANCH" --state open --json number --jq 'length')
          title="Sync upstream FreeCAD ($(date -u +%Y-%m-%d))"
          body=$(printf 'Automated daily sync of upstream \`FreeCAD/%s\` into Parashell \`%s\`.\n\n- New upstream commits: **%s**\n- Review the changes and resolve any merge conflicts before merging.\n\nThis PR is generated by the **Sync upstream FreeCAD** workflow at 00:00 UTC.' "$UPSTREAM_BRANCH" "$TARGET_BRANCH" "$BEHIND")
          if [ "$existing" = "0" ]; then
            gh pr create --base "$TARGET_BRANCH" --head "$SYNC_BRANCH" --title "$title" --body "$body"
          else
            number=$(gh pr list --base "$TARGET_BRANCH" --head "$SYNC_BRANCH" --state open --json number --jq '.[0].number')
            gh pr edit "$number" --title "$title" --body "$body"
          fi
