# This is a build and test workflow for CI of FreeCAD.
# This workflow aims at building and testing FreeCAD on a Conda environment on macOS.

name: Pixi Builds

on:
  workflow_call:
    inputs:
      artifactBasename:
        type: string
        required: true
      testOnBuildDir:
        default: false
        type: boolean
        required: false
      testCoinNodeSnapshots:
        default: true
        type: boolean
        required: false
      skipBuild:
        default: false
        type: boolean
        required: false
      allowedToFail:
        default: false
        type: boolean
        required: false
    outputs:
      reportFile:
        value: ${{ jobs.Build.outputs.reportFile }}

jobs:
  build_with_pixi:
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ inputs.allowedToFail }}
    env:
      CCACHE_COMPRESS: true
      CCACHE_COMPRESSLEVEL: 5
      CCACHE_CONFIGPATH: ${{ github.workspace }}/ccache/config
      CCACHE_DIR: ${{ github.workspace }}/ccache
      CCACHE_MAXSIZE: 1G
      CCACHE_NODIRECT: true
      CCACHE_NOHASHDIR: true
      CCACHE_NOINODECACHE: true
      CCACHE_SLOPPINESS: "include_file_ctime,include_file_mtime,pch_defines,time_macros"
      builddir: ${{ github.workspace }}/build/release/
      cacheKey: pixi-${{ matrix.os }}
      config: release
      logdir: ${{ github.workspace }}/logs/
      reportdir: ${{ github.workspace }}/report/
      reportfilename: ${{ inputs.artifactBasename }}-${{ matrix.os }}-report.md
    outputs:
      reportFile: ${{ steps.Init.outputs.reportFile }}

    strategy:
      max-parallel: 6
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
    - name: Harden the runner (Audit all outbound calls)
      if: "!inputs.skipBuild"
      uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
      with:
        egress-policy: audit

    - name: Set Platform Environment Variables
      if: "!inputs.skipBuild"
      shell: bash -l {0}
      env:
        OPERATING_SYSTEM: ${{ runner.os }}
      run: |
        if [[ $OPERATING_SYSTEM == 'Windows' ]]; then
          echo 'CCACHE_COMPILERCHECK=%compiler%' >> "$GITHUB_ENV"
        else
          echo 'CCACHE_COMPILERCHECK=%compiler% -dumpfullversion -dumpversion' >> "$GITHUB_ENV"
        fi

    - name: Checkout
      if: "!inputs.skipBuild"
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Add GCC Problem Matcher
      if: runner.os == 'Linux' && !inputs.skipBuild
      run: |
        echo "::add-matcher::${{ runner.workspace }}/FreeCAD/.github/problemMatcher/gcc.json"

    - name: Add Clang Problem Matcher
      if: runner.os == 'macOS' && !inputs.skipBuild
      run: |
        echo "::add-matcher::${{ runner.workspace }}/FreeCAD/.github/problemMatcher/clang.json"

    - name: Add MSVC++ Problem Matcher
      if: runner.os == 'Windows' && !inputs.skipBuild
      run: |
        echo "::add-matcher::${{ runner.workspace }}/FreeCAD/.github/problemMatcher/msvc.json"

    - name: Make needed directories, files and initializations
      if: "!inputs.skipBuild"
      id: Init
      run: |
        mkdir -p ${{ env.builddir }}
        mkdir -p ${{ env.logdir }}
        mkdir -p ${{ env.reportdir }}
        echo "reportFile=${{ env.reportfilename }}" >> $GITHUB_OUTPUT

    - if: "!inputs.skipBuild"
      uses: prefix-dev/setup-pixi@1b2de7f3351f171c8b4dfeb558c639cb58ed4ec0 # v0.9.5
      with:
        pixi-version: v0.59.0
        cache: false

    - name: Restore Compiler Cache
      id: cache-restore
      if: "!inputs.skipBuild"
      uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ${{ env.CCACHE_DIR }}
        key: FC-${{ env.cacheKey }}-${{ github.ref }}-${{ github.run_id }}
        restore-keys: |
          FC-${{ env.cacheKey }}-${{ github.ref }}-
          FC-${{ env.cacheKey }}-

    - name: Print CCache statistics before build, reset stats and print config
      if: "!inputs.skipBuild"
      run: |
        pixi run ccache -s
        pixi run ccache -z
        pixi run ccache -p

    - name: CMake Configure
      if: "!inputs.skipBuild"
      run: |
        pixi run configure-${{ env.config }}

    - name: CMake Build
      if: "!inputs.skipBuild"
      run: |
        pixi run build-${{ env.config }}

    - name: Print ccache statistics after Build
      if: "!inputs.skipBuild"
      run: |
        pixi run ccache -s

    - name: FreeCAD CLI tests on build dir
      if: inputs.testOnBuildDir && !inputs.skipBuild
      timeout-minutes: 10
      uses: ./.github/workflows/actions/runPythonTests
      with:
        testDescription: "CLI tests on build dir"
        testCommand: pixi run ${{ env.builddir }}/bin/FreeCADCmd -t 0
        logFile: ${{ env.logdir }}TestCLIBuild.log
        reportFile: ${{env.reportdir}}${{ env.reportfilename }}

    - name: FreeCAD GUI tests on build dir
      if: runner.os == 'Linux' && inputs.testOnBuildDir && !inputs.skipBuild
      timeout-minutes: 15
      uses: ./.github/workflows/actions/runPythonTests
      with:
        testDescription: "GUI tests on build dir"
        testCommand: pixi run xvfb-run ${{ env.builddir }}/bin/FreeCAD -t 0
        logFile: ${{ env.logdir }}TestGUIBuild.log
        reportFile: ${{env.reportdir}}${{ env.reportfilename }}

    - name: Coin node snapshot visual tests on build dir
      if: runner.os == 'Linux' && inputs.testCoinNodeSnapshots && !inputs.skipBuild
      timeout-minutes: 15
      uses: ./.github/workflows/actions/runPythonTests
      with:
        testDescription: "Coin node snapshot visual tests on build dir"
        testCommand: |
          FC_VISUAL_OUT_DIR="/tmp/FreeCADTesting/CoinNodeSnapshots" \
          pixi run xvfb-run -a -s "-screen 0 1024x768x24" \
            "${{ env.builddir }}/bin/FreeCAD" -t TestCoinNodeSnapshots
        logFile: ${{ env.logdir }}TestCoinNodeSnapshotsBuild.log
        reportFile: ${{env.reportdir}}${{ env.reportfilename }}

    - name: Upload Coin node snapshot artifacts (on failure)
      if: failure() && runner.os == 'Linux' && inputs.testCoinNodeSnapshots && !inputs.skipBuild
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: ${{ inputs.artifactBasename }}-${{ matrix.os }}-CoinNodeSnapshots
        path: /tmp/FreeCADTesting/CoinNodeSnapshots

    - name: C++ tests
      timeout-minutes: 10
      if: runner.os != 'Windows' && !inputs.skipBuild
      uses: ./.github/workflows/actions/runCPPTests/runAllTests
      with:
        reportdir: ${{ env.reportdir }}
        builddir: ${{ env.builddir }}
        reportFile: ${{ env.reportdir }}${{ env.reportfilename }}

    - name: CMake Install
      if: "!inputs.skipBuild"
      run: |
        pixi run install-${{ env.config }}

    - name: FreeCAD CLI tests on install
      if: runner.os != 'Windows' && !inputs.skipBuild
      timeout-minutes: 10
      uses: ./.github/workflows/actions/runPythonTests
      with:
        testDescription: "CLI tests on install"
        testCommand: pixi run FreeCADCmd -t 0
        logFile: ${{ env.logdir }}TestCLIInstall.log
        reportFile: ${{env.reportdir}}${{ env.reportfilename }}

    - name: FreeCAD GUI tests on install
      # if: runner.os == 'Linux' && !inputs.skipBuild
      # currently broken on Qt6 builds
      if: false
      timeout-minutes: 15
      uses: ./.github/workflows/actions/runPythonTests
      with:
        testDescription: "GUI tests on install"
        testCommand: pixi run xvfb-run FreeCAD -t 0
        logFile: ${{ env.logdir }}TestGUIInstall.log
        reportFile: ${{env.reportdir}}${{ env.reportfilename }}

    - name: Save Compiler Cache
      id: cache-save
      if: "!inputs.skipBuild"
      uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ${{ env.CCACHE_DIR }}
        key: FC-${{ env.cacheKey }}-${{ github.ref }}-${{ github.run_id }}

    - name: Upload logs
      if: "!inputs.skipBuild"
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: ${{ inputs.artifactBasename }}-${{ matrix.os }}-Logs
        path: |
          ${{ env.logdir }}
          /var/crash/*FreeCAD*

    - name: Upload report
      if: "!inputs.skipBuild"
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: ${{ env.reportfilename }}
        path: |
          ${{env.reportdir}}${{ env.reportfilename }}
